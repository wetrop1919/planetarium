<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Марс — 3D модель</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.module.js"
  }
}
</script>

<style>
  body {
    margin: 0;
    display: flex;
    height: 100vh;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
  }

  #scene {
    flex: 1;
  }

  #info {
    width: 380px;
    padding: 20px;
    background: #111;
    overflow-y: auto;
  }

  h2 {
    margin-top: 0;
	color: #ff6a00;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  td {
    padding: 6px 4px;
    border-bottom: 1px solid #333;
    vertical-align: top;
  }

  td:first-child {
    color: #aaa;
    width: 55%;
  }

  @media (max-width: 768px) {
    body {
      flex-direction: column;
    }

    #info {
      width: 100%;
      height: 40vh;
    }

    #scene {
      height: 60vh;
    }
  }
</style>
</head>

<body>

<div id="scene"></div>

<div id="info">
<h2>Марс</h2>
<table>
<tr><td>Масса</td><td>6,4×10²³ кг</td></tr>
<tr><td>Диаметр</td><td>6670 км</td></tr>
<tr><td>Плотность</td><td>3,95 г/см³</td></tr>
<tr><td>Температура</td><td>-23°C (в среднем)</td></tr>
<tr><td>Длина суток</td><td>24,6 часа</td></tr>
<tr><td>Расстояние от Солнца</td><td>228 млн км</td></tr>
<tr><td>Период обращения</td><td>687 суток</td></tr>
<tr><td>Скорость по орбите</td><td>24,1 км/с</td></tr>
<tr><td>g</td><td>3,7 м/с²</td></tr>
</table>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();

// Камера
const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);

// Рендерер
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const sceneContainer = document.getElementById('scene');
sceneContainer.appendChild(renderer.domElement);

// Свет (тёплый, но не жёлтый)
const sunLight = new THREE.DirectionalLight(0xfcaaaa, 1.2);
sunLight.position.set(10, 5, 10);
scene.add(sunLight);

scene.add(new THREE.AmbientLight(0xffffff, 0.1));

// Планета (оптимизированная геометрия)
const geometry = new THREE.SphereGeometry(2, 32, 32);

const texture = new THREE.TextureLoader().load('textures/mars.jpg');

const material = new THREE.MeshStandardMaterial({
  map: texture
});

const planet = new THREE.Mesh(geometry, material);
scene.add(planet);

camera.position.z = 5;

// Управление
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 3;
controls.maxDistance = 8;

// Звёзды (уменьшено для мобильных)
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 400;
const positions = [];

for (let i = 0; i < starsCount; i++) {
  positions.push(
    (Math.random() - 0.5) * 1500,
    (Math.random() - 0.5) * 1500,
    (Math.random() - 0.5) * 1500
  );
}

starsGeometry.setAttribute(
  'position',
  new THREE.Float32BufferAttribute(positions, 3)
);

const starsMaterial = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 1
});

scene.add(new THREE.Points(starsGeometry, starsMaterial));

// Анимация
function animate() {
  requestAnimationFrame(animate);

  planet.rotation.y += 0.001;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize
function onResize() {
  const width = sceneContainer.clientWidth;
  const height = sceneContainer.clientHeight;

  renderer.setSize(width, height);

  camera.aspect = width / height;
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', onResize);
onResize();

</script>

</body>
</html>
